version: '3.9'
services:
  api:
    build: ./backend
    ports:
      - "5080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Data Source=/data/controlhorario.db
      - DatabaseProvider=Sqlite
      - Cors__AllowedOrigins__0=http://localhost:5173
    volumes:
      - controlhorario_data:/data

volumes:
  controlhorario_data:
